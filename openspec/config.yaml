strict_tdd: false
context: |
  romina-web is a Node.js/TypeScript, React, Next.js 16.2.4 project with React 19 and Tailwind CSS v4.
  Package manager: pnpm.
  No test runner was detected; strict TDD is disabled until a testing framework is added.
  Stack: Next.js, React 19, TypeScript 5.7.3, Tailwind CSS 4.2.0, shadcn/ui (Radix primitives), Zod 3.24.1, React Hook Form 7.54.1, Lucide icons.
rules:
  proposal:
    require_problem_statement: true
  spec:
    require_acceptance_criteria: true
  design:
    require_tradeoffs: true
  tasks:
    protect_review_workload: true
  apply:
    test_command: ""
  verify:
    test_command: ""
testing:
  detected: "2026-05-19"
  runner:
    command: ""
    framework: ""
  layers:
    unit: ""
    integration: ""
    e2e: ""
  commands:
    unit: []
    integration: []
    e2e: []
  coverage:
    command: ""
    commands: []
quality:
  lint: "pnpm run lint"
  lint_commands:
    - scope: "."
      command: "pnpm run lint"
      framework: "eslint"
  typecheck: "npx tsc --noEmit"
  typecheck_commands:
    - scope: "."
      command: "npx tsc --noEmit"
      framework: "typescript"
  format: ""
  format_commands: []